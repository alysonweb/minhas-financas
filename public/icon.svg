<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Trending up arrow -->
  <polyline points="80,360 200,220 296,300 432,140"
    fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="36"
    stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="80,360 200,220 296,300 432,140"
    fill="none" stroke="white" stroke-width="28"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow head -->
  <polyline points="340,128 432,140 420,232"
    fill="none" stroke="white" stroke-width="28"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- R$ label -->
  <text x="256" y="470" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="72" font-weight="700" fill="rgba(255,255,255,0.7)">R$</text>
</svg>
